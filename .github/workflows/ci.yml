name: Flemozi Release Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (x.x.x)
        default: 0.1.1
        required: true
        type: string
      channel:
        type: choice
        description: Release Channel
        required: true
        options:
          - stable
          - nightly
        default: nightly
      dry_run:
        description: Dry run
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env (stable)
        if: inputs.channel == 'stable'
        shell: pwsh
        env:
          DOTENV: ${{ secrets.DOTENV_RELEASE }}
        run: |
          $env:DOTENV | Set-Content .env

      - name: Create .env (nightly)
        if: inputs.channel == 'nightly'
        shell: pwsh
        env:
          DOTENV: ${{ secrets.DOTENV_NIGHTLY }}
        run: |
          $env:DOTENV | Set-Content .env

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (debug check)
        run: cargo build --locked

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build installer
        run: cargo packager --release --formats nsis

      - name: Rename Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Move-Item target/release/flemozi_*_x64-setup.exe dist/Flemozi-windows-x86_64-setup.exe -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flemozi-Release-Binaries
          path: dist/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env (stable)
        if: inputs.channel == 'stable'
        shell: pwsh
        env:
          DOTENV: ${{ secrets.DOTENV_RELEASE }}
        run: |
          $env:DOTENV | Set-Content .env

      - name: Create .env (nightly)
        if: inputs.channel == 'nightly'
        shell: pwsh
        env:
          DOTENV: ${{ secrets.DOTENV_NIGHTLY }}
        run: |
          $env:DOTENV | Set-Content .env

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (debug check)
        run: cargo build --locked

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build DMG
        run: cargo packager --release --formats dmg

      - name: Rename DMG
        run: |
          mkdir -p dist
          mv target/release/flemozi_*.dmg dist/Flemozi-macos-universal.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flemozi-Release-Binaries
          path: dist/

  upload:
    runs-on: ubuntu-22.04
    needs: [windows, macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Flemozi-Release-Binaries
          path: Flemozi-Release-Binaries

      - name: Generate Checksums
        run: |
          cd Flemozi-Release-Binaries
          md5sum * > RELEASE.md5sum
          sha256sum * > RELEASE.sha256sum

      - name: Upload Release Binaries (stable)
        if: ${{ !inputs.dry_run && inputs.channel == 'stable' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ inputs.version }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          allowUpdates: true
          artifacts: Flemozi-Release-Binaries/*

      - name: Upload Release Binaries (nightly)
        if: ${{ !inputs.dry_run && inputs.channel == 'nightly' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          allowUpdates: true
          artifacts: Flemozi-Release-Binaries/*
