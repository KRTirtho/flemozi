name: flemozi
description: A powerful emoji picker
publish_to: "none"
version: 0.2.0+3

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  collection: any
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  fuzzywuzzy: ^1.2.0
  google_fonts: ^8.1.0
  http: ^1.6.0
  hooks_riverpod: ^3.3.2
  riverpod: ^3.3.2
  window_manager: ^0.5.1
  window_size:
    git:
      url: https://github.com/google/flutter-desktop-embedding.git
      path: plugins/window_size
  launch_at_startup: ^0.5.1
  package_info_plus: ^9.0.1
  alfred: ^1.1.3
  shared_preferences: ^2.5.5
  system_theme: ^3.3.0
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  json_annotation: ^4.12.0
  visibility_detector: ^0.4.0+2
  flutter_cache_manager: ^3.4.1
  path: ^1.8.3
  easy_debounce: ^2.0.3
  uuid: ^4.5.3
  shimmer: ^3.0.0
  auto_size_text: ^3.0.0
  path_provider: ^2.1.6
  super_clipboard: ^0.9.1
  super_hot_key: ^0.9.1
  super_keyboard_layout: ^0.9.1
  envied: ^1.3.6
  rust_lib_flemozi:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.14.0
  build_runner: ^2.15.0
  envied_generator: ^1.3.6
  flutter_launcher_icons: ^0.14.4
  html: ^0.15.6
  pub_api_client: ^3.2.0

  pubspec_parse: any
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/twemoji/

flutter_icons:
  android: false
  ios: false
  image_path: "assets/logo.png"
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
