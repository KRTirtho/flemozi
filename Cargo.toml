[package]
name = "flemozi"
version = "0.1.0"
edition = "2024"

[dependencies]
iced = { version = "0.14", features = [
    "tokio",
    "debug",
    "time-travel",
    "webgl",
    "fira-sans",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "fast-rng", "serde"] }
tracing-subscriber = "0.3"
directories = "6.0"
tokio = { version = "1", features = ["fs", "time"] }
